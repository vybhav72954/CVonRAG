# ─────────────────────────────────────────────────────────────────────────────
# CVonRAG — docker-compose.yml
# Full local dev stack: FastAPI app + Ollama (LLM+embeddings) + Qdrant
#
# First run (one-time model download, ~8-10 GB):
#   docker compose up --build
#   # Models are pulled automatically by the model-puller service
#
# Subsequent runs:
#   docker compose up
#
# Endpoints:
#   API       → http://localhost:8000/docs
#   Ollama    → http://localhost:11434
#   Qdrant UI → http://localhost:6333/dashboard
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cvonrag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Model puller (runs once then exits) ────────────────────────────────────
  model-puller:
    image: ollama/ollama:latest
    container_name: cvonrag_model_puller
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Pulling qwen2.5:14b ...' &&
        ollama pull qwen2.5:14b &&
        echo 'Pulling nomic-embed-text ...' &&
        ollama pull nomic-embed-text &&
        echo 'All models ready.'
      "
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"   # exit 0 after pulling — this is intentional

  # ── Qdrant ──────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: cvonrag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI app ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: cvonrag_app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434   # overrides .env for container networking
      QDRANT_URL:      http://qdrant:6333
      APP_ENV:         development
      PORT:            "8000"
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app

volumes:
  ollama_data:
  qdrant_data:
